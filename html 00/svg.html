<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grafico SVG</title>
    <style>
    </style>
</head>

    <body>
        <h1>Grafico SVG</h1>
        <svg width ="300" height ="300"
        viewBox = "0 0 40 40">
            <circle
            r = "40"
            cx = "40"
            cy = "40"
            fill = "hotpink"
            stroke ="yellow"
            stroke-width = "4">
                <animate
                attributeName="cx"
                begin = "0s"
                dur ="1s"
                from ="50"
                to ="90%"
                repeatCount ="indefinite"/>
            </circle> 
        
    </body>

</html>
